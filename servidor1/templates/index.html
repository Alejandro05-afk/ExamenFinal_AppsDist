<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>MapReduce + Flask</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; line-height: 1.5; }
    button { padding: 10px 16px; margin-bottom: 16px; }
    pre { background: #f4f4f4; padding: 12px; border-radius: 6px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h2>Arquitectura MapReduce + Flask</h2>
  <p>Este panel muestra los resultados del procesamiento de los datos de interacción de videos.</p>
  <button onclick="cargarDatos()">Cargar métricas</button>
  <pre id="resultado">Esperando respuesta...</pre>

  <script>
    async function cargarDatos() {
      const res = await fetch('/metricas');
      const data = await res.json();
      document.getElementById('resultado').textContent = JSON.stringify(data, null, 2);
    }
  </script>
</body>
</html>
