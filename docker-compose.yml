services:
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: nginxExamen
    ports:
      - "5040:80"
    depends_on:
      servidor1:
        condition: service_healthy
      servidor2:
        condition: service_healthy

  mysql_principal:
    container_name: MaestroP
    image: mysql:8.0
    ports:
      - "5031:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: examenad
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - ./script_ex_2B.sql:/docker-entrypoint-initdb.d/script_ex_2B.sql
      - master_datos:/var/lib/mysql

  servidor1:
    build:
      context: .
      dockerfile: ./servidor1/Dockerfile
    container_name: servidor1
    depends_on:
      mysql_principal:
        condition: service_healthy
    ports:
      - "5034:5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/datos', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  servidor2:
    build:
      context: .
      dockerfile: ./servidor2/Dockerfile
    container_name: servidor2
    depends_on:
      mysql_principal:
        condition: service_healthy
    ports:
      - "5035:5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/datos', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  phpmyadmin:
    container_name: phpMyAdminPrueba
    image: phpmyadmin:latest
    depends_on:
      mysql_principal:
        condition: service_healthy
    ports:
      - "5033:80"
    environment:
      PMA_HOST: mysql_principal
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root

volumes:
  master_datos:

